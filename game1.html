<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game 1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111317;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    canvas {
      display: block;
      border: 1px solid #2a2d35;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
    }

    a {
      color: #888;
      text-decoration: none;
      font-size: 0.88rem;
      border: 1px solid #2a2d35;
      padding: 8px 18px;
      border-radius: 6px;
      background: #1c1f26;
    }

    a:hover { border-color: #4a90e2; color: #fff; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>
  <a href="../index.html">← Zurück zum Launcher</a>

  <script>
    // ── Konfiguration ──
    const COLS       = 32;
    const ROWS       = 64;
    const CELL       = 10;          // Pixel pro Zelle
    const SPEED      = 3;           // Pixel pro Frame
    const PLAYER_SIZE = CELL - 2;   // leicht kleiner als Zelle

    // ── Canvas ──
    const canvas = document.getElementById("canvas");
    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;
    const ctx = canvas.getContext("2d");

    // ── Spieler (in Pixel) ──
    const player = {
      x: Math.floor(COLS / 2) * CELL,
      y: Math.floor(ROWS / 2) * CELL,
    };

    // ── Tasteneingabe ──
    const keys = {};
    document.addEventListener("keydown", e => keys[e.key] = true);
    document.addEventListener("keyup",   e => keys[e.key] = false);

    function getInput() {
      let dx = 0, dy = 0;
      if (keys["ArrowLeft"]  || keys["a"]) dx -= SPEED;
      if (keys["ArrowRight"] || keys["d"]) dx += SPEED;
      if (keys["ArrowUp"]    || keys["w"]) dy -= SPEED;
      if (keys["ArrowDown"]  || keys["s"]) dy += SPEED;
      return { dx, dy };
    }

    // ── Update ──
    function update() {
      const { dx, dy } = getInput();

      player.x = Math.max(0, Math.min(canvas.width  - PLAYER_SIZE, player.x + dx));
      player.y = Math.max(0, Math.min(canvas.height - PLAYER_SIZE, player.y + dy));
    }

    // ── Zeichnen ──
    function draw() {
      // Hintergrund
      ctx.fillStyle = "#1c1f26";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Raster
      ctx.strokeStyle = "#23262e";
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
      }

      // Spieler
      ctx.fillStyle = "#4a90e2";
      ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
    }

    // ── Game Loop ──
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>

</body>
</html>
