<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECH ANATOMY — Technik von innen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg-dark: #050608;
    --bg-mid: #0a0c10;
    --accent-cyan: #00f5ff;
    --accent-purple: #7c3aed;
    --accent-orange: #ff6b35;
    --accent-green: #00ff88;
    --accent-gold: #ffc800;
    --text-primary: #f0f4ff;
    --text-muted: #8892a4;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: linear-gradient(var(--accent-cyan), var(--accent-purple)); border-radius: 3px; }

  /* ─── CUSTOM CURSOR GLOW ─── */
  .cursor-glow {
    position: fixed; width: 400px; height: 400px;
    border-radius: 50%; pointer-events: none; z-index: 1;
    background: radial-gradient(circle, rgba(0,245,255,0.04), transparent 70%);
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
    will-change: transform;
  }

  /* ─── LOADER ─── */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg-dark);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    transition: opacity 0.8s var(--ease-smooth), visibility 0.8s;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-ring {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid rgba(0,245,255,0.15);
    border-top-color: var(--accent-cyan);
    animation: spin 0.9s linear infinite;
  }
  .loader-text {
    font-family: 'Space Mono', monospace; font-size: 0.7rem;
    letter-spacing: 4px; color: var(--text-muted);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── PROGRESS BAR ─── */
  #scroll-progress {
    position: fixed; top: 0; left: 0; height: 2px; z-index: 1001;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple), var(--accent-orange));
    width: 0%;
    box-shadow: 0 0 12px rgba(0,245,255,0.6);
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(5,6,8,0.7);
    backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    transition: padding 0.4s var(--ease-smooth);
  }
  nav.scrolled { padding: 12px 40px; background: rgba(5,6,8,0.92); }
  .nav-logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;
  }
  .nav-logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-cyan); box-shadow: 0 0 12px var(--accent-cyan);
    animation: pulseDot 2s ease infinite;
  }
  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a {
    color: var(--text-muted); text-decoration: none;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.3px;
    padding: 8px 14px; border-radius: 20px;
    transition: all 0.3s var(--ease-smooth);
    position: relative;
  }
  .nav-links a:hover { color: var(--text-primary); background: var(--glass); }
  .nav-links a.active { color: var(--accent-cyan); background: rgba(0,245,255,0.08); }

  /* ─── HERO ─── */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 50% 60%, #0a1530 0%, #050608 70%);
  }
  #hero-canvas-3d { position: absolute; inset: 0; z-index: 1; }
  #hero-particles { position: absolute; inset: 0; opacity: 0.5; z-index: 0; }

  .hero-content { position: relative; z-index: 2; text-align: center; padding: 20px; pointer-events: none; }
  .hero-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; letter-spacing: 5px; color: var(--accent-cyan);
    margin-bottom: 24px; opacity: 0;
    animation: fadeUp 1s var(--ease-smooth) 0.3s forwards;
    text-shadow: 0 0 20px rgba(0,245,255,0.5);
  }
  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 9vw, 7.5rem);
    font-weight: 800; line-height: 0.92;
    letter-spacing: -3px;
    opacity: 0;
    animation: fadeUp 1s var(--ease-smooth) 0.5s forwards;
  }
  .hero-title .line2 {
    background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 50%, var(--accent-orange) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: gradientShift 6s ease infinite;
  }
  @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .hero-sub {
    margin-top: 28px;
    font-size: 1.1rem; color: var(--text-muted); max-width: 540px; margin-inline: auto;
    opacity: 0; animation: fadeUp 1s var(--ease-smooth) 0.7s forwards;
    line-height: 1.7;
  }
  .hero-cta {
    margin-top: 48px; opacity: 0;
    animation: fadeUp 1s var(--ease-smooth) 0.9s forwards;
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    pointer-events: all;
  }
  .btn-primary {
    padding: 15px 38px; border-radius: 50px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    color: #fff; font-weight: 600; font-size: 0.95rem;
    border: none; cursor: pointer; text-decoration: none;
    transition: transform 0.4s var(--ease-spring), box-shadow 0.4s;
    box-shadow: 0 0 40px rgba(0,245,255,0.25);
    position: relative; overflow: hidden;
  }
  .btn-primary::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-orange));
    opacity: 0; transition: opacity 0.4s;
  }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary span { position: relative; z-index: 1; }
  .btn-primary:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 60px rgba(0,245,255,0.5); }
  .btn-ghost {
    padding: 15px 38px; border-radius: 50px;
    border: 1px solid var(--glass-border);
    color: var(--text-primary); font-weight: 500; font-size: 0.95rem;
    background: var(--glass); cursor: pointer; text-decoration: none;
    transition: all 0.4s var(--ease-smooth); backdrop-filter: blur(10px);
  }
  .btn-ghost:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); transform: translateY(-3px); background: rgba(0,245,255,0.06); }

  .scroll-hint {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    opacity: 0; animation: fadeUp 1s ease 1.4s forwards;
    color: var(--text-muted); font-size: 0.7rem; letter-spacing: 3px;
    z-index: 2;
  }
  .scroll-mouse {
    width: 26px; height: 42px; border-radius: 14px;
    border: 1.5px solid rgba(0,245,255,0.4);
    position: relative;
  }
  .scroll-mouse::before {
    content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    width: 3px; height: 8px; border-radius: 2px;
    background: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan);
    animation: scrollDot 1.8s ease infinite;
  }
  @keyframes scrollDot { 0% { opacity: 1; top: 6px; } 70% { opacity: 0; top: 22px; } 100% { opacity: 0; top: 6px; } }

  /* ─── FLUID SVG TRANSITIONS ─── */
  .fluid-transition {
    position: relative; height: 220px; overflow: hidden;
    margin-top: -2px;
  }
  .fluid-transition svg { position: absolute; width: 100%; height: 100%; }
  .fluid-blob-layer { position: absolute; inset: 0; }

  .bubble-transition { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 2; }
  .bubble {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.08), transparent 70%);
    animation: floatBubble linear infinite;
    backdrop-filter: blur(2px);
  }

  .petal-burst { position: absolute; pointer-events: none; }
  .petal {
    position: absolute; width: 14px; height: 14px; border-radius: 50% 0;
    opacity: 0; transform-origin: center;
  }

  /* ─── SECTIONS ─── */
  section { position: relative; padding: 140px 40px; }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 5px;
    color: var(--accent-cyan); margin-bottom: 16px;
    opacity: 0; transform: translateY(24px) scale(0.96);
    transition: all 0.8s var(--ease-smooth);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .section-label.visible { opacity: 1; transform: translateY(0) scale(1); }
  .section-label-num {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid currentColor; display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.4rem, 5.5vw, 4.8rem);
    font-weight: 800; line-height: 1.02;
    letter-spacing: -2.5px;
    opacity: 0; transform: translateY(40px);
    transition: all 0.9s var(--ease-smooth) 0.1s;
  }
  .section-title.visible { opacity: 1; transform: translateY(0); }
  .section-title .accent-word { position: relative; display: inline-block; }

  .section-layout {
    max-width: 1440px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 90px; align-items: center;
  }
  .section-layout.reverse { direction: rtl; }
  .section-layout.reverse > * { direction: ltr; }

  /* ─── 3D STAGE (Three.js mount points) ─── */
  .device-stage {
    position: relative; height: 560px;
    opacity: 0; transform: translateX(50px) scale(0.92);
    transition: all 1s var(--ease-smooth) 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .device-stage.visible { opacity: 1; transform: translateX(0) scale(1); }
  .device-stage canvas { cursor: grab; touch-action: none; }
  .device-stage canvas:active { cursor: grabbing; }

  .stage-glow {
    position: absolute; width: 70%; height: 70%; border-radius: 50%;
    filter: blur(80px); opacity: 0.25; z-index: 0;
    animation: glowPulse 4s ease infinite;
  }
  @keyframes glowPulse { 0%,100% { opacity: 0.18; transform: scale(1); } 50% { opacity: 0.32; transform: scale(1.08); } }

  .stage-hint {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    font-size: 0.68rem; color: var(--text-muted); font-family: 'Space Mono', monospace;
    letter-spacing: 2px; display: flex; align-items: center; gap: 8px;
    opacity: 0.7; pointer-events: none;
  }
  .stage-hint-icon { width: 14px; height: 14px; opacity: 0.6; }

  .explode-toggle {
    position: absolute; top: 12px; right: 12px; z-index: 5;
    padding: 9px 18px; border-radius: 30px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
    color: var(--text-muted); font-size: 0.7rem; font-family: 'Space Mono', monospace;
    letter-spacing: 1.5px; cursor: pointer; backdrop-filter: blur(10px);
    transition: all 0.3s var(--ease-smooth); display: flex; align-items: center; gap: 6px;
  }
  .explode-toggle:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,245,255,0.06); transform: translateY(-1px); }
  .explode-toggle.active { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,245,255,0.1); }
  .explode-toggle-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ─── INFO PANEL ─── */
  .info-panel { opacity: 0; transform: translateY(30px); transition: all 0.9s var(--ease-smooth) 0.25s; }
  .info-panel.visible { opacity: 1; transform: translateY(0); }

  .accent-line {
    width: 56px; height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-cyan), transparent);
    margin-bottom: 26px;
    opacity: 0; transform: scaleX(0); transform-origin: left;
    transition: all 0.7s var(--ease-smooth) 0.3s;
  }
  .accent-line.visible { opacity: 1; transform: scaleX(1); }

  .section-desc {
    color: var(--text-muted); line-height: 1.85; margin: 26px 0; font-size: 1rem;
    max-width: 480px;
  }

  .device-selector { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .device-btn {
    padding: 9px 20px; border-radius: 22px;
    border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--text-muted);
    font-size: 0.8rem; cursor: pointer;
    transition: all 0.35s var(--ease-smooth); font-family: 'Space Mono', monospace;
  }
  .device-btn.active { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,245,255,0.1); box-shadow: 0 0 20px rgba(0,245,255,0.15); }
  .device-btn:hover:not(.active) { border-color: rgba(255,255,255,0.2); color: var(--text-primary); transform: translateY(-1px); }

  .component-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; }
  .comp-card {
    padding: 20px; border-radius: 14px;
    background: var(--glass); border: 1px solid var(--glass-border);
    cursor: pointer; transition: all 0.4s var(--ease-smooth);
    position: relative; overflow: hidden;
    opacity: 0; transform: translateY(16px);
  }
  .comp-card.visible { opacity: 1; transform: translateY(0); }
  .comp-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(0,245,255,0.08), transparent 60%);
    opacity: 0; transition: opacity 0.4s;
  }
  .comp-card:hover { border-color: rgba(0,245,255,0.35); transform: translateY(-4px) scale(1.015); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .comp-card:hover::before { opacity: 1; }
  .comp-icon { font-size: 1.7rem; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 8px rgba(0,245,255,0.3)); }
  .comp-name { font-size: 0.82rem; font-weight: 700; margin-bottom: 4px; }
  .comp-sub { font-size: 0.7rem; color: var(--text-muted); font-family: 'Space Mono', monospace; }

  /* ─── SIDEBAR ─── */
  .detail-sidebar {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: min(440px, 92vw);
    background: rgba(5,6,8,0.97);
    backdrop-filter: blur(40px) saturate(150%);
    border-left: 1px solid var(--glass-border);
    z-index: 2000;
    transform: translateX(100%);
    transition: transform 0.55s var(--ease-smooth);
    overflow-y: auto; padding: 44px 34px;
  }
  .detail-sidebar.open { transform: translateX(0); }
  .sidebar-close {
    position: absolute; top: 22px; right: 22px;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--glass); border: 1px solid var(--glass-border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 1.1rem;
    transition: all 0.3s var(--ease-smooth);
  }
  .sidebar-close:hover { background: rgba(255,255,255,0.1); color: #fff; transform: rotate(90deg); }
  .sidebar-tag { font-family: 'Space Mono', monospace; font-size: 0.68rem; letter-spacing: 4px; margin-bottom: 14px; opacity: 0; animation: slideIn 0.5s var(--ease-smooth) 0.1s forwards; }
  .sidebar-name { font-family: 'Syne', sans-serif; font-size: 2.1rem; font-weight: 800; line-height: 1.08; margin-bottom: 22px; opacity: 0; animation: slideIn 0.5s var(--ease-smooth) 0.15s forwards; }
  .sidebar-desc { color: var(--text-muted); line-height: 1.85; font-size: 0.9rem; margin-bottom: 30px; opacity: 0; animation: slideIn 0.5s var(--ease-smooth) 0.2s forwards; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .sidebar-3d-mini {
    height: 230px; border-radius: 16px;
    background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid var(--glass-border);
    margin-bottom: 28px; position: relative; overflow: hidden;
    opacity: 0; animation: slideIn 0.5s var(--ease-smooth) 0.22s forwards;
  }
  .sidebar-3d-mini canvas { width: 100% !important; height: 100% !important; }

  .sidebar-specs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
  .spec-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 17px; border-radius: 10px;
    background: var(--glass); border: 1px solid var(--glass-border);
    opacity: 0; transform: translateX(-10px);
    animation: slideRight 0.4s var(--ease-smooth) forwards;
    transition: border-color 0.3s;
  }
  .spec-row:hover { border-color: rgba(255,255,255,0.2); }
  @keyframes slideRight { to { opacity: 1; transform: translateX(0); } }
  .spec-label { font-size: 0.8rem; color: var(--text-muted); }
  .spec-val { font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 700; }

  .sidebar-model-picker { margin-bottom: 10px; opacity: 0; animation: slideIn 0.5s var(--ease-smooth) 0.4s forwards; }
  .sidebar-model-picker h4 { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 1.5px; }
  .model-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .model-chip {
    padding: 7px 15px; border-radius: 20px;
    border: 1px solid var(--glass-border);
    font-size: 0.74rem; font-family: 'Space Mono', monospace;
    cursor: pointer; background: var(--glass); color: var(--text-muted);
    transition: all 0.3s var(--ease-smooth);
  }
  .model-chip.active, .model-chip:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,245,255,0.1); }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 1999; opacity: 0; pointer-events: none;
    transition: opacity 0.5s var(--ease-smooth);
    backdrop-filter: blur(6px);
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  /* ─── OVERVIEW ─── */
  #overview-section { background: var(--bg-dark); padding: 120px 40px; }
  .overview-grid {
    max-width: 1440px; margin: 64px auto 0;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 22px;
  }
  .overview-card {
    padding: 32px 22px; border-radius: 18px;
    background: var(--glass); border: 1px solid var(--glass-border);
    text-align: center; cursor: pointer;
    transition: all 0.4s var(--ease-smooth);
    opacity: 0; transform: translateY(24px);
    position: relative; overflow: hidden;
  }
  .overview-card.visible { opacity: 1; transform: translateY(0); }
  .overview-card::after {
    content: ''; position: absolute; inset: 0; opacity: 0;
    background: radial-gradient(circle at 50% 0%, rgba(0,245,255,0.1), transparent 70%);
    transition: opacity 0.4s;
  }
  .overview-card:hover { border-color: rgba(0,245,255,0.35); transform: translateY(-6px) scale(1.02); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
  .overview-card:hover::after { opacity: 1; }
  .overview-icon { font-size: 2.6rem; margin-bottom: 14px; filter: drop-shadow(0 0 12px rgba(0,245,255,0.2)); }
  .overview-name { font-weight: 700; font-size: 0.97rem; margin-bottom: 6px; }
  .overview-count { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: va
