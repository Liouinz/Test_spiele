<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Launcher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Game Launcher</h1>
    <p>Wähle ein Spiel</p>
  </header>

  <main id="game-grid">
    <!-- Karten werden per JS eingefügt -->
  </main>

  <!-- Overlay mit iframe -->
  <div id="overlay">
    <div id="overlay-inner">
      <button id="close-btn" onclick="closeGame()">✕ Schließen</button>
      <iframe id="game-frame" src="" title="Spiel"></iframe>
    </div>
  </div>

  <script src="launcher.js"></script>
</body>
</html>
