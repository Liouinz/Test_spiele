<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCADE HUB</title>
  <meta name="description" content="Your personal game launcher — play anywhere, anytime." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,800;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ BACKGROUND CANVAS ░░ -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ░░ TOP NAVIGATION ░░ -->
  <header class="topbar">
    <div class="topbar__logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">ARCADE HUB</span>
    </div>
    <nav class="topbar__actions">
      <button class="btn-icon" id="theme-toggle" title="Theme umschalten" aria-label="Theme umschalten">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button class="btn-icon" id="fullscreen-toggle" title="Vollbild" aria-label="Vollbild umschalten">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      </button>
      <div class="player-info">
        <div class="avatar">P</div>
        <span class="player-name">Player</span>
      </div>
    </nav>
  </header>

  <!-- ░░ MAIN CONTENT ░░ -->
  <main class="main">

    <!-- Section heading -->
    <section class="hero-section">
      <p class="hero-label">FEATURED GAMES</p>
      <h1 class="hero-title" id="active-title">Loading…</h1>
      <p class="hero-sub" id="active-genre"></p>
    </section>

    <!-- ░░ CAROUSEL ░░ -->
    <div class="carousel-wrapper" role="region" aria-label="Spiele-Auswahl">
      <button class="carousel-arrow carousel-arrow--left" id="arrow-left" aria-label="Vorheriges Spiel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="carousel-track-container">
        <div class="carousel-track" id="carousel-track" role="listbox" aria-label="Spiele">
          <!-- Cards injected by JS -->
        </div>
      </div>

      <button class="carousel-arrow carousel-arrow--right" id="arrow-right" aria-label="Nächstes Spiel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>

    <!-- Dot indicators -->
    <div class="carousel-dots" id="carousel-dots" role="tablist" aria-label="Spiel-Navigation"></div>

    <!-- Quick info bar -->
    <div class="info-bar">
      <div class="info-bar__stat" id="info-rating">
        <span class="info-bar__label">RATING</span>
        <span class="info-bar__value" id="active-rating">—</span>
      </div>
      <div class="info-bar__stat">
        <span class="info-bar__label">STATUS</span>
        <span class="info-bar__value" id="active-status">—</span>
      </div>
      <div class="info-bar__stat">
        <span class="info-bar__label">LAST PLAYED</span>
        <span class="info-bar__value" id="active-lastplayed">Never</span>
      </div>
    </div>

  </main>

  <!-- ░░ FOCUS / DETAIL OVERLAY ░░ -->
  <div class="focus-overlay" id="focus-overlay" role="dialog" aria-modal="true" aria-labelledby="focus-title">
    <div class="focus-panel" id="focus-panel">

      <button class="focus-close" id="focus-close" aria-label="Schließen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div class="focus-cover-wrap">
        <div class="focus-cover" id="focus-cover"></div>
        <div class="focus-cover-glow" id="focus-cover-glow"></div>
      </div>

      <div class="focus-info">
        <div class="focus-badge" id="focus-badge"></div>
        <h2 class="focus-title" id="focus-title"></h2>
        <p class="focus-genre" id="focus-genre"></p>
        <p class="focus-desc" id="focus-desc"></p>

        <div class="focus-meta">
          <div class="focus-meta__item">
            <span class="focus-meta__label">RATING</span>
            <span class="focus-meta__val" id="focus-rating">—</span>
          </div>
          <div class="focus-meta__item">
            <span class="focus-meta__label">STATUS</span>
            <span class="focus-meta__val" id="focus-status">—</span>
          </div>
          <div class="focus-meta__item">
            <span class="focus-meta__label">HIGHSCORE</span>
            <span class="focus-meta__val" id="focus-highscore">—</span>
          </div>
        </div>

        <div class="focus-actions">
          <button class="btn-play" id="focus-play-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            SPIELEN
          </button>
          <button class="btn-fav" id="focus-fav-btn" title="Favorit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>

        <!-- Loading bar (visible when launching) -->
        <div class="launch-progress" id="launch-progress">
          <div class="launch-progress__bar" id="launch-bar"></div>
          <span class="launch-progress__label">LAUNCHING…</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ░░ TOAST NOTIFICATION ░░ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
