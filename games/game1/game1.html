<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Game 1 – 3D World</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw; height: 100vh;
      background: #87afc8;
      touch-action: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Loading */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: #0d1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; color: #fff;
    }
    #loading h2 { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.05em; }
    #loading-bar-wrap {
      width: 220px; height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px; overflow: hidden;
    }
    #loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #4a90e2, #e2c94e);
      border-radius: 3px; transition: width 0.3s ease;
    }
    #loading-sub { font-size: 0.78rem; color: rgba(255,255,255,0.4); }

    /* HUD */
    #hud {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      background: rgba(0,0,0,0.50); color: #fff;
      font-size: 0.95rem; font-weight: 600;
      padding: 8px 15px; border-radius: 9px;
      pointer-events: none; user-select: none;
      display: flex; align-items: center; gap: 7px;
      backdrop-filter: blur(4px);
    }
    #coin-count { color: #e2c94e; transition: transform 0.15s ease, color 0.15s ease; }

    /* Back button */
    #back-btn {
      position: fixed; top: 14px; right: 14px; z-index: 10;
      background: rgba(15,18,26,0.82); color: #ccc;
      border: 1px solid rgba(255,255,255,0.16);
      padding: 9px 17px; border-radius: 8px;
      font-size: 0.83rem; cursor: pointer; font-family: inherit;
      backdrop-filter: blur(4px);
      transition: border-color 0.2s, color 0.2s;
    }
    #back-btn:hover, #back-btn:active { border-color: #4a90e2; color: #fff; }

    /* Joystick */
    #joy-base {
      position: fixed; bottom: 50px; left: 50px; z-index: 10;
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.28);
      pointer-events: none; user-select: none;
    }
    #joy-stick {
      position: absolute; width: 46px; height: 46px; border-radius: 50%;
      left: 55px; top: 55px; transform: translate(-50%,-50%);
      background: rgba(74,144,226,0.65); border: 2px solid #4a90e2;
    }

    /* Camera tip */
    #cam-tip {
      position: fixed; bottom: 58px; right: 18px; z-index: 10;
      color: rgba(255,255,255,0.30); font-size: 0.7rem;
      text-align: center; pointer-events: none; user-select: none; line-height: 1.65;
    }

    /* Win banner */
    #win-banner {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%); z-index: 20;
      background: rgba(0,0,0,0.84); color: #e2c94e;
      font-size: 1.4rem; font-weight: 700;
      padding: 24px 44px; border-radius: 14px;
      border: 2px solid #e2c94e; text-align: center;
      display: none; pointer-events: none; backdrop-filter: blur(6px);
    }
    #win-banner p { font-size: 0.82rem; color: rgba(255,255,255,0.75); font-weight: 400; margin-top: 8px; }

    /* Desktop: Joystick + tip verstecken */
    @media (hover: hover) {
      #joy-base { display: none; }
      #cam-tip  { display: none; }
    }
  </style>
</head>
<body>

  <div id="loading">
    <h2>🌲 Game 1 wird geladen…</h2>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-sub">Initialisiere…</div>
  </div>

  <div id="hud">
    <span>🪙</span>
    <span id="coin-count">0</span>
    <span style="color:rgba(255,255,255,0.4)">/</span>
    <span id="coin-total">20</span>
  </div>

  <button id="back-btn">← Launcher</button>
  <div id="joy-base"><div id="joy-stick"></div></div>
  <div id="cam-tip">Drag → Kamera<br>Pinch → Zoom</div>
  <div id="win-banner">🎉 Alle Münzen gesammelt!<p>Neue Runde startet…</p></div>

  <script type="module">
    // Ladebalken
    const bar = document.getElementById('loading-bar');
    const sub = document.getElementById('loading-sub');
    const steps = [
      [15,'Engine initialisieren…'],[35,'Welt aufbauen…'],
      [55,'Wald generieren…'],[75,'Zaun aufstellen…'],
      [90,'Spieler laden…'],[100,'Fertig!']
    ];
    let si = 0;
    const tick = () => {
      if (si >= steps.length) return;
      const [p, m] = steps[si++];
      bar.style.width = p + '%'; sub.textContent = m;
      setTimeout(tick, 150 + Math.random()*100);
    };
    tick();

    await import('./main.js');

    setTimeout(() => {
      const el = document.getElementById('loading');
      el.style.transition = 'opacity 0.6s ease';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 650);
    }, 400);
  </script>

</body>
</html>
